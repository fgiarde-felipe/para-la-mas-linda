<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff4f8b" />
  <meta property="og:title" content="Acceso restringido" />
  <meta property="og:description" content="Página exclusiva. Solo una persona puede entrar." />
  <title>Acceso restringido</title>

  <style>
    :root {
      --pink: #ff4f8b;
      --pink-dark: #db2f6a;
      --soft-pink: #ffe4ed;
      --cream: #fff9fb;
      --text: #2b2b2b;
      --muted: #777;
      --card: rgba(255, 255, 255, 0.92);
      --shadow: 0 25px 80px rgba(130, 35, 75, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at top left, #fff 0 10%, transparent 30%),
        radial-gradient(circle at bottom right, #ffc8da 0 10%, transparent 28%),
        linear-gradient(135deg, #ffd1dc, #fff0f5 45%, #ffe8c8);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 79, 139, 0.12) 1.5px, transparent 1.5px);
      background-size: 26px 26px;
      pointer-events: none;
      opacity: 0.75;
    }

    .card {
      position: relative;
      width: min(100%, 560px);
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 30px;
      padding: 34px 26px;
      text-align: center;
      box-shadow: var(--shadow);
      animation: appear 0.35s ease both;
      z-index: 1;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 79, 139, 0.08);
      right: -75px;
      top: -75px;
      pointer-events: none;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(12px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--soft-pink);
      color: var(--pink-dark);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.03;
      letter-spacing: -0.05em;
    }

    h2 {
      margin: 0 0 10px;
      font-size: clamp(25px, 6vw, 34px);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    p {
      margin: 11px auto;
      max-width: 460px;
      font-size: 18px;
      line-height: 1.5;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .buttons {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .evasive-floating {
      position: fixed;
      margin: 0;
      z-index: 2147483647;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      min-height: 50px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--pink), #ff7aaa);
      box-shadow: 0 12px 26px rgba(255, 79, 139, 0.28);
      transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
      touch-action: manipulation;
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      filter: brightness(1.02);
      box-shadow: 0 14px 28px rgba(255, 79, 139, 0.33);
    }

    button:active {
      transform: translateY(0) scale(0.98);
    }

    .secondary {
      background: white;
      color: var(--pink-dark);
      border: 1px solid #ffd0df;
      box-shadow: none;
    }

    .danger {
      background: #eeeeee;
      color: #333;
      box-shadow: none;
      position: relative;
    }

    .message {
      min-height: 30px;
      margin-top: 18px;
      color: var(--pink-dark);
      font-weight: 900;
    }

    .progress-text {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 12px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #f2e2e8;
      border-radius: 999px;
      overflow: hidden;
      margin: 0 auto 20px;
      max-width: 360px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--pink), #ffb347);
      border-radius: inherit;
      transition: width 0.3s ease;
    }

    .loader {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      margin: 18px auto;
      border: 9px solid #ffe0ea;
      border-top-color: var(--pink);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-number {
      font-size: clamp(48px, 15vw, 74px);
      font-weight: 950;
      color: var(--pink);
      line-height: 1;
      margin: 18px 0 8px;
      letter-spacing: -0.06em;
    }

    .stats {
      display: grid;
      gap: 10px;
      margin: 22px auto;
      max-width: 430px;
      text-align: left;
    }

    .stat {
      background: #fff6f9;
      border: 1px solid #ffd5e2;
      padding: 13px 15px;
      border-radius: 18px;
      font-weight: 800;
    }

    .final-note {
      background: #fff6f9;
      border: 1px dashed #ff9abd;
      border-radius: 22px;
      padding: 18px;
      margin-top: 18px;
      text-align: left;
    }

    .final-note p {
      font-size: 16px;
      margin: 8px 0;
    }

    .heart {
      position: fixed;
      top: -20px;
      font-size: 22px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 4;
    }

    .youtube-audio-player {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 200px;
      height: 200px;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    .toast-host {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 30;
      pointer-events: none;
    }

    .toast {
      width: min(320px, calc(100vw - 44px));
      background: rgba(43, 43, 43, 0.92);
      color: white;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(43, 43, 43, 0.22);
      overflow: hidden;
      padding: 16px 18px 14px;
      animation: toast-in 0.3s ease both;
    }

    .toast-text {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      color: white;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .toast-timer {
      height: 4px;
      margin: 12px -18px -14px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    .toast-timer-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #ffb347, var(--pink));
      transform-origin: left center;
      animation: toast-timer linear forwards;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(10px) scale(0.97); }
    }

    @keyframes toast-timer {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }

    @keyframes fall {
      to {
        transform: translateY(calc(100vh + 40px)) rotate(360deg);
        opacity: 0;
      }
    }

    .shake {
      animation: shake 0.25s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @media (max-width: 420px) {
      .card {
        padding: 30px 18px;
        border-radius: 26px;
      }

      .toast-host {
        left: 14px;
        right: 14px;
        bottom: 14px;
      }

      .toast {
        width: 100%;
      }

      button {
        width: 100%;
      }

      .buttons {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="youtube-audio-player" id="youtubeAudioPlayer"></div>
  <div class="toast-host" id="toastHost"></div>
  <main class="card" id="app"></main>

  <script>
    // Cambiá estos textos si querés personalizarlo más.
    const TU_NOMBRE = "Felipe";
    const NOMBRE_DE_ELLA = "Lucia"; // Ejemplo: "Sofi". Si lo dejás vacío, usa "vos".
    const AUDIO_VIDEO_ID = "5bcgc8pVQT8";
    const TOAST_DURATION = 5000;

    const app = document.getElementById("app");
    const toastHost = document.getElementById("toastHost");
    let currentQuestion = 0;
    let audioPlayer;
    let youtubeApiRequested = false;
    let toastTimeoutId;

    const ella = NOMBRE_DE_ELLA.trim() || "vos";

    const questions = [
      {
        question: "Cuanto queres a Felipe?",
        options: [
          { text: "Mucho" },
          { text: "Muchísimo" },
          { text: "Más que a nadie" },
          { text: "No tengo opción porque el Fipo hizo este test" }
        ],
        nextMessage: "Ay muchas gracias! Lo sabia 🥰"
      },
      {
        question: "¿Quién tiene razón en las discusiones?",
        options: [
          { text: "A. Felipe" },
          { text: "B. Fipo" },
          { text: "C. A" },
          { text: "D. B" },
          { text: `E. ${NOMBRE_DE_ELLA.trim() || "Vos"}`, evasive: true }
        ],
        nextMessage: "Muy bien! Que suerte que sabes quien tiene los pantalones en la relacion."
      }
    ];

    function render(html) {
      const floatingEscape = document.getElementById("discussionEscape");
      if (floatingEscape && !app.contains(floatingEscape)) {
        floatingEscape.remove();
      }

      app.classList.remove("shake");
      app.innerHTML = html;
    }

    function showAccessScreen() {
      render(`
        <h1>Acceso denegado</h1>
        <p>Esta página es exclusiva para la chica más linda.</p>
        <p class="muted">Si no sos ella, por favor retirate.</p>
        <div class="buttons">
          <button onclick="verifyBeauty()">Soy yo</button>
        </div>
      `);
      showVolumeToast();
    }

    function verifyBeauty() {
      clearToast();
      showQuizBriefing();
    }

    function showQuizBriefing() {
      render(`
        <h2>Test para Lucia</h2>
        <p>A continuacion deberas hacer un test oficial para proporcionar informacion importante para Felipe</p>
        <div class="buttons">
          <button onclick="startQuiz()">Okay</button>
        </div>
      `);
    }

    function showVolumeToast() {
      clearToast();

      toastHost.innerHTML = `
        <div class="toast" id="volumeToast">
          <strong class="toast-title">Subí el volumen</strong>
          <p class="toast-text">Hay música de fondo. Vale más con audio.</p>
          <div class="toast-timer">
            <div class="toast-timer-fill" style="animation-duration: ${TOAST_DURATION}ms;"></div>
          </div>
        </div>
      `;

      const toastTitle = toastHost.querySelector(".toast-title");
      const toastText = toastHost.querySelector(".toast-text");

      if (toastTitle) {
        toastTitle.remove();
      }

      if (toastText) {
        toastText.textContent = "Subi el volumen";
      }

      toastTimeoutId = window.setTimeout(() => {
        const toast = document.getElementById("volumeToast");

        if (!toast) {
          return;
        }

        toast.style.animation = "toast-out 0.22s ease forwards";
        window.setTimeout(clearToast, 220);
      }, TOAST_DURATION);
    }

    function clearToast() {
      window.clearTimeout(toastTimeoutId);
      toastTimeoutId = undefined;
      toastHost.innerHTML = "";
    }

    function startQuiz() {
      currentQuestion = 0;
      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentQuestion];
      const progress = Math.round((currentQuestion / questions.length) * 100);

      render(`
        <div class="progress-text">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
        <h2>Evaluación oficial</h2>
        <p>${q.question}</p>
        <div class="buttons">
          ${q.options.map((option, index) => `
            <button
              class="${option.evasive ? "" : (index % 2 ? "secondary" : "")} ${option.evasive ? "secondary" : ""}"
              ${option.evasive ? 'id="discussionEscape"' : ""}
              ${option.evasive ? 'onmouseenter="moveDiscussionButton()"' : ""}
              ${option.evasive ? 'onpointerdown="return handleEvasiveInteraction(event)"' : ""}
              onclick="${option.evasive ? 'return false' : `answerQuestion(${index})`}"
            >${option.text}</button>
          `).join("")}
        </div>
        <div class="message" id="message"></div>
      `);
    }

    function answerQuestion(index) {
      const q = questions[currentQuestion];
      const selected = q.options[index];

      if (selected.evasive) {
        moveDiscussionButton();
        return;
      }

      showTransitionMessage(q.nextMessage, () => {
        currentQuestion++;

        if (currentQuestion >= questions.length) {
          showResult();
        } else {
          showQuestion();
        }
      });
    }

    function moveDiscussionButton() {
      const btn = document.getElementById("discussionEscape");

      if (!btn) {
        return;
      }

      placeDiscussionButton();
    }

    function handleEvasiveInteraction(event) {
      event.preventDefault();
      event.stopPropagation();
      moveDiscussionButton();
      return false;
    }

    function placeDiscussionButton() {
      const btn = document.getElementById("discussionEscape");

      if (!btn) {
        return;
      }

      const padding = 16;
      const rect = btn.getBoundingClientRect();

      if (!btn.classList.contains("evasive-floating")) {
        btn.classList.add("evasive-floating");
        btn.style.width = `${rect.width}px`;
        btn.style.left = `${rect.left}px`;
        btn.style.top = `${rect.top}px`;
        document.body.appendChild(btn);
      }

      const currentLeft = parseFloat(btn.style.left || rect.left);
      const currentTop = parseFloat(btn.style.top || rect.top);
      const bounds = getDiscussionButtonBounds(btn, padding);
      const minLeft = bounds.minLeft;
      const maxLeft = bounds.maxLeft;
      const minTop = bounds.minTop;
      const maxTop = bounds.maxTop;
      let left = clamp(currentLeft + random(-170, 170), minLeft, maxLeft);
      let top = clamp(currentTop + random(-110, 110), minTop, maxTop);

      if (Math.abs(left - currentLeft) < 35 && Math.abs(top - currentTop) < 25) {
        left = clamp(currentLeft + random(-210, 210), minLeft, maxLeft);
        top = clamp(currentTop + random(-140, 140), minTop, maxTop);
      }

      btn.style.left = `${left}px`;
      btn.style.top = `${top}px`;
    }

    function getDiscussionButtonBounds(btn, padding) {
      const minLeft = padding;
      const maxLeft = Math.max(minLeft, window.innerWidth - btn.offsetWidth - padding);
      let minTop = padding;
      const maxTop = Math.max(minTop, window.innerHeight - btn.offsetHeight - padding);

      const buttonsGroup = app.querySelector(".buttons");

      if (buttonsGroup) {
        const buttonsRect = buttonsGroup.getBoundingClientRect();
        minTop = Math.min(
          maxTop,
          Math.max(minTop, Math.ceil(buttonsRect.bottom) + padding)
        );
      }

      return { minLeft, maxLeft, minTop, maxTop };
    }

    function keepDiscussionButtonInBounds() {
      const btn = document.getElementById("discussionEscape");

      if (!btn || !btn.classList.contains("evasive-floating")) {
        return;
      }

      const padding = 16;
      const bounds = getDiscussionButtonBounds(btn, padding);
      const minLeft = bounds.minLeft;
      const maxLeft = bounds.maxLeft;
      const minTop = bounds.minTop;
      const maxTop = bounds.maxTop;

      btn.style.left = `${clamp(parseFloat(btn.style.left || minLeft), minLeft, maxLeft)}px`;
      btn.style.top = `${clamp(parseFloat(btn.style.top || minTop), minTop, maxTop)}px`;
    }

    function showTransitionMessage(message, onComplete) {
      render(`
        <div class="message" style="min-height:auto; font-size:28px; margin-top:0;">${message}</div>
        <div class="progress-bar" style="margin-top: 22px;">
          <div class="progress-fill" id="transitionProgress" style="width: 0; transition: width 5s linear;"></div>
        </div>
      `);

      requestAnimationFrame(() => {
        const progress = document.getElementById("transitionProgress");
        if (progress) {
          progress.style.width = "100%";
        }
      });

      setTimeout(onComplete, 5000);
    }

    function showResult() {
      const paciencia = 100;
      const insoportable = 43;

      render(`
        <div class="badge">📋 Informe final</div>
        <h1>Diagnóstico completo</h1>
        <div class="result-number">100%</div>
        <p>Confirmado: ${ella} es oficialmente la persona favorita de ${TU_NOMBRE}.</p>

        <div class="stats">
          <div class="stat">💖 Nivel de lindura: ilegal</div>
          <div class="stat">😌 Paciencia con ${TU_NOMBRE}: ${paciencia}%</div>
          <div class="stat">😈 Probabilidad de que ${TU_NOMBRE} te siga molestando: ${insoportable}%</div>
          <div class="stat">🔒 Estado de la relación: no reembolsable</div>
        </div>

        <div class="final-note">
          <p><strong>Nota final, ahora sí sin hacerme el gracioso:</strong></p>
          <p>Me encanta molestarte, hacerte reír y buscar cualquier excusa para sacarte una sonrisa.</p>
          <p>Pero posta: te quiero muchísimo. Sos mi persona favorita, incluso cuando te hacés la difícil.</p>
        </div>

        <div class="buttons">
          <button onclick="rainHearts()">Aceptar diagnóstico</button>
          <button class="secondary" onclick="startQuiz()">Repetir evaluación</button>
        </div>
      `);

      rainHearts();
    }

    function rainHearts() {
      const hearts = ["💖", "💕", "💘", "💗", "❤️", "✨"];
      for (let i = 0; i < 34; i++) {
        setTimeout(() => {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          heart.style.left = Math.random() * 100 + "vw";
          heart.style.animationDuration = random(2200, 4200) + "ms";
          heart.style.opacity = String(Math.random() * 0.6 + 0.4);
          heart.style.fontSize = random(17, 30) + "px";
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 4600);
        }, i * 70);
      }
    }

    function random(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function requestAudioStart() {
      if (!audioPlayer || typeof audioPlayer.playVideo !== "function") {
        return;
      }

      audioPlayer.unMute();
      audioPlayer.setVolume(100);
      audioPlayer.playVideo();
    }

    function attachAudioRetryListeners() {
      const retry = () => {
        requestAudioStart();
      };

      document.addEventListener("pointerdown", retry, { passive: true });
      document.addEventListener("keydown", retry);
      document.addEventListener("touchstart", retry, { passive: true });
    }

    function loadYouTubeAudio() {
      if (youtubeApiRequested) {
        return;
      }

      youtubeApiRequested = true;
      attachAudioRetryListeners();

      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    }

    function onYouTubeIframeAPIReady() {
      audioPlayer = new YT.Player("youtubeAudioPlayer", {
        width: "200",
        height: "200",
        videoId: AUDIO_VIDEO_ID,
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          loop: 1,
          modestbranding: 1,
          playlist: AUDIO_VIDEO_ID,
          playsinline: 1,
          rel: 0
        },
        events: {
          onReady: () => {
            requestAudioStart();
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.ENDED) {
              audioPlayer.seekTo(0);
              requestAudioStart();
            }
          }
        }
      });
    }

    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

    window.addEventListener("resize", keepDiscussionButtonInBounds);
    loadYouTubeAudio();
    showAccessScreen();
  </script>
</body>
</html>
