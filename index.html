<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff4f8b" />
  <meta name="color-scheme" content="light" />
  <meta property="og:title" content="Para Lucia" />
  <meta property="og:description" content="Página exclusiva. Solo una persona puede entrar." />
  <title>Para Lucia</title>
  <link rel="icon" type="image/png" href="heart.png" />

  <style>
    :root {
      color-scheme: light;
      --pink: #ff4f8b;
      --pink-dark: #db2f6a;
      --soft-pink: #ffe4ed;
      --cream: #fff9fb;
      --text: #2b2b2b;
      --muted: #777;
      --card: rgba(255, 255, 255, 0.92);
      --shadow: 0 25px 80px rgba(130, 35, 75, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :focus-visible {
      outline: none;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    body.layout-top {
      align-items: start;
      padding-top: 40px;
      background:
        radial-gradient(circle at top left, #fff 0 10%, transparent 30%),
        radial-gradient(circle at bottom right, #ffc8da 0 10%, transparent 28%),
        linear-gradient(135deg, #ffd1dc, #fff0f5 45%, #ffe8c8);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 79, 139, 0.12) 1.5px, transparent 1.5px);
      background-size: 26px 26px;
      pointer-events: none;
      opacity: 0.75;
    }

    .app-shell {
      position: relative;
      width: min(100%, 560px);
    }

    .card {
      position: relative;
      width: 100%;
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 30px;
      padding: 34px 26px;
      text-align: center;
      box-shadow: var(--shadow);
      animation: appear 0.35s ease both;
      z-index: 1;
      overflow: hidden;
    }

    .nav-host {
      position: absolute;
      top: 0;
      right: 0;
      transform: translateY(calc(-100% - 10px));
      display: flex;
      gap: 6px;
      align-items: center;
      z-index: 3;
    }

    .nav-host .question-nav {
      margin: 0;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .nav-host .question-nav button {
      min-height: 36px;
      padding: 7px 16px;
      font-size: 17px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
    }

    .sticker-host {
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      width: 100%;
      display: flex;
      justify-content: center;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 2;
    }

    .complaint-sticker {
      width: min(240px, calc(100vw - 48px));
      display: block;
      border-radius: 26px;
      box-shadow: 0 18px 34px rgba(84, 20, 46, 0.28);
      opacity: 0;
      transform: translate(-90px, -90px) scale(0.55) rotate(-28deg);
      animation: sticker-slap 0.72s cubic-bezier(0.18, 0.9, 0.22, 1.25) forwards;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 79, 139, 0.08);
      right: -75px;
      top: -75px;
      pointer-events: none;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(12px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes sticker-slap {
      0% {
        opacity: 0;
        transform: translate(-90px, -90px) scale(0.55) rotate(-28deg);
      }
      18% {
        opacity: 1;
      }
      62% {
        transform: translate(12px, 12px) scale(1.08) rotate(-1deg);
      }
      80% {
        transform: translate(-5px, -5px) scale(0.97) rotate(-6deg);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(-4deg);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--soft-pink);
      color: var(--pink-dark);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.03;
      letter-spacing: -0.05em;
    }

    h2 {
      margin: 0 0 10px;
      font-size: clamp(25px, 6vw, 34px);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    p {
      margin: 11px auto;
      max-width: 460px;
      font-size: 18px;
      line-height: 1.5;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .access-warning {
      font-size: 17px;
    }

    .buttons {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .question-nav {
      margin: 0 0 18px;
      position: relative;
      z-index: 2;
    }

    .evasive-floating {
      position: fixed;
      margin: 0;
      z-index: 2147483647;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      min-height: 50px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--pink), #ff7aaa);
      box-shadow: 0 12px 26px rgba(255, 79, 139, 0.28);
      transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
      touch-action: manipulation;
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      filter: brightness(1.02);
      box-shadow: 0 14px 28px rgba(255, 79, 139, 0.33);
    }

    button:active {
      transform: translateY(0) scale(0.98);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      filter: saturate(0.8);
      box-shadow: none;
      transform: none;
    }

    .question-nav button {
      background: linear-gradient(135deg, #213660, #45679b);
      color: white;
      box-shadow: 0 12px 24px rgba(33, 54, 96, 0.24);
    }

    .question-nav .secondary {
      background: linear-gradient(135deg, #fff0c6, #ffd885);
      color: #7a4b00;
      border: 1px solid #f0c269;
      box-shadow: 0 10px 20px rgba(122, 75, 0, 0.12);
    }

    .secondary {
      background: white;
      color: var(--pink-dark);
      border: 1px solid #ffd0df;
      box-shadow: none;
    }

    button.answer-selected {
      box-shadow: 0 0 0 3px white, 0 0 0 6px var(--pink), 0 14px 28px rgba(255, 79, 139, 0.38);
      transform: scale(1.05);
      filter: brightness(1.06);
    }

    .secondary.answer-selected {
      background: linear-gradient(135deg, var(--pink), #ff7aaa);
      color: white;
      border-color: var(--pink);
      box-shadow: 0 0 0 3px white, 0 0 0 6px var(--pink), 0 14px 28px rgba(255, 79, 139, 0.38);
      transform: scale(1.05);
    }

    .danger {
      background: #eeeeee;
      color: #333;
      box-shadow: none;
      position: relative;
    }

    .message {
      min-height: 30px;
      margin-top: 18px;
      color: var(--pink-dark);
      font-weight: 900;
    }

    .progress-text {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 12px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #f2e2e8;
      border-radius: 999px;
      overflow: hidden;
      margin: 0 auto 20px;
      max-width: 360px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--pink), #ffb347);
      border-radius: inherit;
      transition: width 0.3s ease;
    }

    .slider-card {
      margin: 22px auto 0;
      max-width: 420px;
      padding: 18px 18px 16px;
      border-radius: 24px;
      background: #fff6f9;
      border: 1px solid #ffd5e2;
      text-align: left;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-weight: 900;
      color: var(--pink-dark);
    }

    .slider-value {
      min-width: 58px;
      text-align: right;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .slider-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .service-slider {
      width: 100%;
      accent-color: var(--pink);
      cursor: pointer;
    }

    .service-slider:disabled {
      cursor: not-allowed;
      opacity: 0.85;
    }

    .complaint-input {
      width: min(100%, 420px);
      margin: 18px auto 0;
      display: block;
      padding: 15px 18px;
      border-radius: 18px;
      border: 1px solid #ffd0df;
      background: white;
      font-size: 16px;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .complaint-input:focus {
      border-color: #ff7aaa;
      box-shadow: 0 0 0 4px rgba(255, 79, 139, 0.12);
    }

    .loader {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      margin: 18px auto;
      border: 9px solid #ffe0ea;
      border-top-color: var(--pink);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-note {
      max-width: 420px;
      margin-top: 14px;
      font-size: 15px;
      line-height: 1.45;
    }

    .result-number {
      font-size: clamp(48px, 15vw, 74px);
      font-weight: 950;
      color: var(--pink);
      line-height: 1;
      margin: 18px 0 8px;
      letter-spacing: -0.06em;
    }

    .stats {
      display: grid;
      gap: 10px;
      margin: 22px auto;
      max-width: 430px;
      text-align: left;
    }

    .stat {
      background: #fff6f9;
      border: 1px solid #ffd5e2;
      padding: 13px 15px;
      border-radius: 18px;
      font-weight: 800;
    }

    .final-note {
      background: #fff6f9;
      border: 1px dashed #ff9abd;
      border-radius: 22px;
      padding: 18px;
      margin-top: 18px;
      text-align: left;
    }

    .final-note p {
      font-size: 16px;
      margin: 8px 0;
    }

    .heart {
      position: fixed;
      top: -20px;
      font-size: 22px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 4;
    }

    .youtube-audio-player {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 200px;
      height: 200px;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    .toast-host {
      position: fixed;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      z-index: 30;
      pointer-events: none;
    }

    .toast {
      width: min(320px, calc(100vw - 44px));
      background: rgba(43, 43, 43, 0.92);
      color: white;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(43, 43, 43, 0.22);
      overflow: hidden;
      padding: 16px 18px 14px;
      animation: toast-in 0.3s ease both;
    }

    .toast--light {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 79, 139, 0.22);
      box-shadow: 0 14px 36px rgba(130, 35, 75, 0.16);
    }

    .toast--light .toast-text {
      color: var(--pink-dark);
    }

    .toast-text {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      color: white;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .toast-timer {
      height: 4px;
      margin: 12px -18px -14px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    .toast-timer-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #ffb347, var(--pink));
      transform-origin: left center;
      animation: toast-timer linear forwards;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(10px) scale(0.97); }
    }

    @keyframes toast-timer {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }

    @keyframes fall {
      to {
        transform: translateY(calc(100vh + 40px)) rotate(360deg);
        opacity: 0;
      }
    }

    .shake {
      animation: shake 0.25s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @media (max-width: 420px) {
      .card {
        padding: 30px 18px;
        border-radius: 26px;
      }

      .toast-host {
        top: 14px;
      }

      .toast {
        width: min(320px, calc(100vw - 28px));
      }

      button {
        width: 100%;
      }

      .option-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        width: 100%;
      }

      .buttons {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="youtube-audio-player" id="youtubeAudioPlayer"></div>
  <div class="toast-host" id="toastHost"></div>
  <div class="app-shell">
    <main class="card" id="app"></main>
    <div class="nav-host" id="navHost"></div>
    <div class="sticker-host" id="stickerHost"></div>
  </div>

  <script>
    const TU_NOMBRE = "Felipe";
    const NOMBRE_DE_ELLA = "Lucia";
    const AUDIO_VIDEO_ID = "5bcgc8pVQT8";
    const TOAST_DURATION = 5000;
    const TRANSITION_DURATION = 5000;
    const FINAL_LOADING_DURATION = 20000;

    const app = document.getElementById("app");
    const toastHost = document.getElementById("toastHost");
    const stickerHost = document.getElementById("stickerHost");
    const navHost = document.getElementById("navHost");

    let currentQuestion = 0;
    let audioPlayer;
    let youtubeApiRequested = false;
    let toastTimeoutId;
    let complaintStickerTimeoutId;
    let questionState = [];

    const ella = NOMBRE_DE_ELLA.trim() || "vos";

    const questions = [
      {
        type: "options",
        question: "¿Cuánto querés a Felipe?",
        options: [
          { text: "A. Mucho" },
          { text: "B. Muchísimo" },
          { text: "C. Más que a nadie" },
          { text: "D. No tengo otra opción porque el Fipo hizo este test" }
        ],
        nextMessage: "Ay, muchas gracias. Lo sabía 🥰"
      },
      {
        type: "options",
        question: "¿Quién tiene siempre la razón?",
        options: [
          { text: "A. Felipe" },
          { text: "B. Fipo" },
          { text: "C. Opción A" },
          { text: "D. Opción C" },
          { text: `E. ${NOMBRE_DE_ELLA.trim() || "Vos"}`, evasive: true }
        ],
        nextMessage: "Muy bien. Qué suerte que sabés quién tiene los pantalones en la relación."
      },
      {
        type: "slider",
        question: "¿Qué tan satisfecha estás con el servicio de ragebait que te brinda Felipe?",
        nextMessage: "Perfecto. El sistema registró una satisfacción total, como corresponde."
      }
    ];

    function createInitialQuestionState() {
      return questions.map(() => ({
        answer: null,
        answered: false,
        messageShown: false
      }));
    }

    function getQuestionState(index) {
      return questionState[index];
    }

    function isQuestionComplete(index) {
      const q = questions[index];
      const state = getQuestionState(index);

      if (!q || !state) {
        return false;
      }

      if (q.type === "slider") {
        return state.answered && state.answer === 100;
      }

      return state.answered;
    }

    function allQuestionsAnswered() {
      return questions.every((_, index) => isQuestionComplete(index));
    }

    function updateSubmitButtonState() {
      const submitButton = Array.from(navHost.querySelectorAll(".question-nav button"))
        .find((button) => button.textContent.trim() === "Enviar test");

      if (!submitButton) {
        return;
      }

      submitButton.disabled = !allQuestionsAnswered();
    }

    function render(html) {
      const floatingEscape = document.getElementById("discussionEscape");
      if (floatingEscape && !app.contains(floatingEscape)) {
        floatingEscape.remove();
      }

      clearComplaintSticker();
      app.classList.remove("shake");
      app.innerHTML = html;
      if (navHost) navHost.innerHTML = "";
      document.body.classList.remove("layout-top");
    }

    function clearComplaintSticker() {
      window.clearTimeout(complaintStickerTimeoutId);
      complaintStickerTimeoutId = undefined;

      if (!stickerHost) {
        return;
      }

      stickerHost.innerHTML = "";
    }

    function scheduleComplaintSticker() {
      clearComplaintSticker();

      complaintStickerTimeoutId = window.setTimeout(() => {
        if (!stickerHost) {
          return;
        }

        stickerHost.innerHTML = '<img src="middle-finger.jpg" alt="" class="complaint-sticker" />';
      }, 2000);
    }

    function showAccessScreen() {
      render(`
        <h1>Acceso denegado</h1>
        <p>Esta página es exclusiva para la chica más linda.</p>
        <p class="muted access-warning">Si no sos ella, por favor retirate.</p>
        <div class="buttons">
          <button onclick="verifyBeauty()">Soy yo</button>
        </div>
      `);

      showVolumeToast();
    }

    function verifyBeauty() {
      clearToast();
      showQuizBriefing();
    }

    function showQuizBriefing() {
      render(`
        <h2>Test para Lucia</h2>
        <p>A continuación deberás hacer un test oficial para proporcionar información importante para Felipe.</p>
        <div class="buttons">
          <button onclick="startQuiz()">Okay</button>
        </div>
      `);
    }

    function showVolumeToast() {
      clearToast();

      toastHost.innerHTML = `
        <div class="toast toast--light" id="volumeToast">
          <p class="toast-text">Subí el volumen</p>
        </div>
      `;

      requestAnimationFrame(positionToastHost);
    }

    function clearToast() {
      window.clearTimeout(toastTimeoutId);
      toastTimeoutId = undefined;
      toastHost.innerHTML = "";
    }

    function positionToastHost() {
      const toast = document.getElementById("volumeToast");

      if (!toast) {
        return;
      }

      const cardRect = app.getBoundingClientRect();
      const toastRect = toast.getBoundingClientRect();
      const top = Math.max(14, cardRect.top - toastRect.height - 28);
      const left = cardRect.left + (cardRect.width / 2);

      toastHost.style.top = `${top}px`;
      toastHost.style.left = `${left}px`;
      toastHost.style.transform = "translateX(-50%)";
    }

    function startQuiz() {
      currentQuestion = 0;
      questionState = createInitialQuestionState();
      showQuestion();
    }

    function renderQuestionNavigation(isLastQuestion) {
      const canSubmit = allQuestionsAnswered();
      const currentAnswered = isQuestionComplete(currentQuestion);
      const nextDisabled = isLastQuestion ? !canSubmit : !currentAnswered;

      navHost.innerHTML = `
        <div class="buttons question-nav">
          ${currentQuestion > 0 ? '<button class="secondary" type="button" onclick="goToPreviousQuestion()">←</button>' : ""}
          <button type="button" onclick="${isLastQuestion ? "submitRagebaitSlider()" : "goToNextQuestion()"}" ${nextDisabled ? "disabled" : ""}>${isLastQuestion ? "Enviar test" : "→"}</button>
        </div>
      `;
    }

    function showQuestion() {
      const q = questions[currentQuestion];
      const state = getQuestionState(currentQuestion);
      const progress = Math.round(((currentQuestion + 1) / questions.length) * 100);
      const isLastQuestion = currentQuestion === questions.length - 1;

      if (q.type === "slider") {
        const sliderValue = state.answered && typeof state.answer === "number"
          ? state.answer
          : 0;

        render(`
          <div class="progress-text">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
          <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
          <h2>Evaluación oficial</h2>
          <p>${q.question}</p>
          <div class="slider-card">
            <div class="slider-header">
              <span>Nivel de satisfacción</span>
              <span class="slider-value" id="ragebaitSliderValue">${sliderValue}%</span>
            </div>
            <input
              id="ragebaitSlider"
              class="service-slider"
              type="range"
              min="0"
              max="100"
              value="${sliderValue}"
              oninput="handleRagebaitSliderMove()"
              onchange="handleRagebaitSliderRelease()"
              onpointerup="handleRagebaitSliderRelease()"
              onkeyup="handleRagebaitSliderRelease()"
            />
            <div class="slider-scale">
              <span>0%</span>
              <span>100%</span>
            </div>
          </div>
          <div class="message" id="message"></div>
        `);

        renderQuestionNavigation(isLastQuestion);
        return;
      }

      render(`
        <div class="progress-text">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
        <h2>Evaluación oficial</h2>
        <p>${q.question}</p>
        <div class="buttons option-buttons">
          ${q.options.map((option, index) => `
            <button
              class="${option.evasive ? "secondary" : (index % 2 ? "secondary" : "")} ${state.answer === index ? "answer-selected" : ""}"
              ${option.evasive ? 'id="discussionEscape"' : ""}
              ${option.evasive ? 'onmouseenter="moveDiscussionButton()"' : ""}
              ${option.evasive ? 'onpointerdown="return handleEvasiveInteraction(event)"' : ""}
              onclick="${option.evasive ? 'return false' : `answerQuestion(${index})`}"
            >${option.text}</button>
          `).join("")}
        </div>
        <div class="message" id="message"></div>
      `);

      renderQuestionNavigation(false);
    }

    function answerQuestion(index) {
      const q = questions[currentQuestion];
      const selected = q.options[index];

      if (selected.evasive) {
        moveDiscussionButton();
        return;
      }

      const state = getQuestionState(currentQuestion);
      state.answer = index;
      state.answered = true;

      const message = document.getElementById("message");
      if (message) {
        message.textContent = "";
      }

      showQuestion();
      updateSubmitButtonState();
    }

    function goToPreviousQuestion() {
      if (currentQuestion <= 0) {
        return;
      }

      currentQuestion--;
      showQuestion();
    }

    function goToNextQuestion() {
      if (currentQuestion >= questions.length - 1) {
        return;
      }

      const q = questions[currentQuestion];
      const state = getQuestionState(currentQuestion);

      const advance = () => {
        currentQuestion++;
        showQuestion();
      };

      if (state.answered && !state.messageShown && q.nextMessage) {
        state.messageShown = true;
        showTransitionMessage(q.nextMessage, advance);
        return;
      }

      advance();
    }

    function handleRagebaitSliderMove() {
      const slider = document.getElementById("ragebaitSlider");
      const sliderValue = document.getElementById("ragebaitSliderValue");
      const message = document.getElementById("message");

      if (!slider || !sliderValue) {
        return;
      }

      const state = getQuestionState(currentQuestion);
      state.answer = Number(slider.value);
      state.answered = true;
      sliderValue.textContent = `${slider.value}%`;

      if (message) {
        message.textContent = "";
      }

      updateSubmitButtonState();
    }

    function handleRagebaitSliderRelease() {
      const slider = document.getElementById("ragebaitSlider");
      const sliderValue = document.getElementById("ragebaitSliderValue");
      const state = getQuestionState(currentQuestion);

      if (!slider || !sliderValue || !state.answered) {
        return;
      }

      state.answer = 100;
      state.answered = true;
      slider.value = "100";
      sliderValue.textContent = "100%";
      updateSubmitButtonState();
    }

    function submitRagebaitSlider() {
      const state = getQuestionState(currentQuestion);
      const message = document.getElementById("message");

      if (!state.answered) {
        if (message) {
          message.textContent = "Debes dar un nivel de satisfacción antes de continuar.";
        }

        return;
      }

      if (!allQuestionsAnswered()) {
        if (message) {
          message.textContent = "Debes responder todas las preguntas antes de enviar el test.";
        }

        return;
      }

      state.answer = 100;
      state.answered = true;

      if (message) {
        message.textContent = "";
      }

      showFinalLoadingScreen(showResult);
    }

    function moveDiscussionButton() {
      const btn = document.getElementById("discussionEscape");

      if (!btn) {
        return;
      }

      placeDiscussionButton();
    }

    function handleEvasiveInteraction(event) {
      event.preventDefault();
      event.stopPropagation();
      moveDiscussionButton();
      return false;
    }

    function placeDiscussionButton() {
      const btn = document.getElementById("discussionEscape");

      if (!btn) {
        return;
      }

      const padding = 16;
      const rect = btn.getBoundingClientRect();

      if (!btn.classList.contains("evasive-floating")) {
        btn.classList.add("evasive-floating");
        btn.style.width = `${rect.width}px`;
        btn.style.left = `${rect.left}px`;
        btn.style.top = `${rect.top}px`;
        document.body.appendChild(btn);
      }

      const currentLeft = parseFloat(btn.style.left || rect.left);
      const currentTop = parseFloat(btn.style.top || rect.top);
      const bounds = getDiscussionButtonBounds(btn, padding);
      const minLeft = bounds.minLeft;
      const maxLeft = bounds.maxLeft;
      const minTop = bounds.minTop;
      const maxTop = bounds.maxTop;

      let left = clamp(currentLeft + random(-170, 170), minLeft, maxLeft);
      let top = clamp(currentTop + random(-110, 110), minTop, maxTop);

      if (Math.abs(left - currentLeft) < 35 && Math.abs(top - currentTop) < 25) {
        left = clamp(currentLeft + random(-210, 210), minLeft, maxLeft);
        top = clamp(currentTop + random(-140, 140), minTop, maxTop);
      }

      btn.style.left = `${left}px`;
      btn.style.top = `${top}px`;
    }

    function getDiscussionButtonBounds(btn, padding) {
      const minLeft = padding;
      const maxLeft = Math.max(minLeft, window.innerWidth - btn.offsetWidth - padding);
      let minTop = padding;
      const maxTop = Math.max(minTop, window.innerHeight - btn.offsetHeight - padding);

      const buttonGroups = Array.from(app.querySelectorAll(".buttons"));

      if (buttonGroups.length) {
        const lowestButtonsBottom = Math.max(
          ...buttonGroups.map((group) => Math.ceil(group.getBoundingClientRect().bottom))
        );

        minTop = Math.min(
          maxTop,
          Math.max(minTop, lowestButtonsBottom + padding)
        );
      }

      return { minLeft, maxLeft, minTop, maxTop };
    }

    function keepDiscussionButtonInBounds() {
      const btn = document.getElementById("discussionEscape");

      if (!btn || !btn.classList.contains("evasive-floating")) {
        return;
      }

      const padding = 16;
      const bounds = getDiscussionButtonBounds(btn, padding);

      btn.style.left = `${clamp(parseFloat(btn.style.left || bounds.minLeft), bounds.minLeft, bounds.maxLeft)}px`;
      btn.style.top = `${clamp(parseFloat(btn.style.top || bounds.minTop), bounds.minTop, bounds.maxTop)}px`;
    }

    function showTransitionMessage(message, onComplete) {
      render(`
        <div class="message" style="min-height:auto; font-size:28px; margin-top:0;">${message}</div>
        <div class="progress-bar" style="margin-top: 22px;">
          <div class="progress-fill" id="transitionProgress" style="width: 0; transition: width ${TRANSITION_DURATION}ms linear;"></div>
        </div>
      `);

      requestAnimationFrame(() => {
        const progress = document.getElementById("transitionProgress");
        if (progress) {
          progress.style.width = "100%";
        }
      });

      window.setTimeout(onComplete, TRANSITION_DURATION);
    }

    function showFinalLoadingScreen(onComplete) {
      showLoadingScreen(
        "Cargando...",
        "(Esta pantalla de carga es totalmente innecesaria y solo existe para hacerte perder el tiempo)",
        onComplete
      );
    }

    function showLoadingScreen(title, note, onComplete) {
      render(`
        <h1>${title}</h1>
        <div class="loader" aria-hidden="true"></div>
        <p class="muted loading-note">${note}</p>
        <div class="progress-bar" style="margin-top: 24px;">
          <div class="progress-fill" id="finalLoadingProgress" style="width: 0; transition: width ${FINAL_LOADING_DURATION}ms linear;"></div>
        </div>
      `);

      requestAnimationFrame(() => {
        const progress = document.getElementById("finalLoadingProgress");
        if (progress) {
          progress.style.width = "100%";
        }
      });

      window.setTimeout(onComplete, FINAL_LOADING_DURATION);
    }

    function showResult() {
      render(`
        <div class="badge">📋 Informe final</div>
        <h1>Diagnóstico completo</h1>
        <div class="result-number">100%</div>
        <p>Confirmado: ${ella} es oficialmente la persona favorita de ${TU_NOMBRE} 💖</p>

        <div class="buttons">
          <button onclick="rainHearts()">Aceptar diagnóstico</button>
          <button onclick="showComplaintForm()">Denunciar test</button>
          <button class="secondary" onclick="showAccessScreen()">Volver al inicio</button>
        </div>
      `);

      rainHearts();
    }

    function showComplaintForm() {
      render(`
        <h2>Crees que este test esta arreglado o tienes alguna queja? Escribenos!</h2>
        <input
          id="complaintInput"
          class="complaint-input"
          type="text"
          placeholder="Escribe tu denuncia"
          oninput="handleComplaintInput()"
        />
        <div class="buttons">
          <button id="complaintSubmit" onclick="submitComplaint()" disabled>Enviar</button>
          <button class="secondary" onclick="showResult()">Volver</button>
        </div>
      `);
    }

    function handleComplaintInput() {
      const input = document.getElementById("complaintInput");
      const submit = document.getElementById("complaintSubmit");

      if (!input || !submit) {
        return;
      }

      submit.disabled = input.value.trim().length === 0;
    }

    function submitComplaint() {
      const input = document.getElementById("complaintInput");

      if (!input || input.value.trim().length === 0) {
        return;
      }

      showLoadingScreen(
        "Cargando...",
        "Esta pantalla de carga tambien es totalmente innecesaria",
        showComplaintResult
      );
    }

    function showComplaintResult() {
      render(`
        <h1>Denuncia recibida.</h1>
        <p>Estado: ignorada.</p>
        <p>Motivo: el área de denuncias también está administrada por Felipe.</p>
        <div class="buttons">
          <button onclick="showResult()">Volver a informe final</button>
          <button class="secondary" onclick="showAccessScreen()">Volver al inicio</button>
        </div>
      `);

      if (window.matchMedia("(max-width: 640px)").matches) {
        document.body.classList.add("layout-top");
      }

      scheduleComplaintSticker();
    }

    function rainHearts() {
      const hearts = ["💖", "💕", "💘", "💗", "❤️", "✨"];

      for (let i = 0; i < 34; i++) {
        window.setTimeout(() => {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          heart.style.left = `${Math.random() * 100}vw`;
          heart.style.animationDuration = `${random(2200, 4200)}ms`;
          heart.style.opacity = String(Math.random() * 0.6 + 0.4);
          heart.style.fontSize = `${random(17, 30)}px`;
          document.body.appendChild(heart);
          window.setTimeout(() => heart.remove(), 4600);
        }, i * 70);
      }
    }

    function random(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function requestAudioStart() {
      if (!audioPlayer || typeof audioPlayer.playVideo !== "function") {
        return;
      }

      audioPlayer.unMute();
      audioPlayer.setVolume(100);
      audioPlayer.playVideo();
    }

    function attachAudioRetryListeners() {
      const retry = () => {
        requestAudioStart();
      };

      document.addEventListener("pointerdown", retry, { passive: true });
      document.addEventListener("keydown", retry);
      document.addEventListener("touchstart", retry, { passive: true });
    }

    function loadYouTubeAudio() {
      if (youtubeApiRequested) {
        return;
      }

      youtubeApiRequested = true;
      attachAudioRetryListeners();

      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    }

    function onYouTubeIframeAPIReady() {
      audioPlayer = new YT.Player("youtubeAudioPlayer", {
        width: "200",
        height: "200",
        videoId: AUDIO_VIDEO_ID,
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          loop: 1,
          modestbranding: 1,
          playlist: AUDIO_VIDEO_ID,
          playsinline: 1,
          rel: 0
        },
        events: {
          onReady: () => {
            requestAudioStart();
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.ENDED) {
              audioPlayer.seekTo(0);
              requestAudioStart();
            }
          }
        }
      });
    }

    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

    window.addEventListener("resize", () => {
      keepDiscussionButtonInBounds();
      positionToastHost();
    });

    loadYouTubeAudio();
    showAccessScreen();
  </script>
</body>
</html>
